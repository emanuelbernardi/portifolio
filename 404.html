<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var path = window.location.pathname;
      var repo = path.split('/')[1] || 'portifolio';
      window.location.replace(
        window.location.origin + '/' + repo + '/?p=' + encodeURIComponent(path)
      );
    </script>
  </head>
  <body></body>
</html>
