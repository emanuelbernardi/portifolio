<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var path = window.location.pathname;
      var repo = path.split('/')[1] || 'portifolio';
      var route = path.replace(/^\/[^/]+/, '');
      if (!route) route = '/';
      window.location.replace(
        window.location.origin + '/' + repo + '/#' + route
      );
    </script>
  </head>
  <body></body>
</html>
